schemaVersion: v0.2
prepare:
  steps:
    - name: Give Appropriate Permissions To The Install Script
      command: chmod -R +x ./scripts/
    - name: Install Nix dependencies
      command: ./scripts/nix-deps.sh
    - name: Run The Installation Script
      command: ./scripts/install.sh
test:
  steps: []
run:
  kcPg:
    provider:
      name: postgres
      version: v1
    plan:
      id: 0
      parameters:
        cpu: 1
        memory: 500
        storage: 1024
    config:
      version: "17.6"
    secrets:
      userPassword: ${{ vault.kcPgPw }}
      superuserPassword: ${{ vault.kcPgPw }}
  keycloak:
    steps:
      - name: Start Keycloak
        command: ./scripts/start.sh
    plan: 201
    replicas: 1
    network:
      ports:
        - port: 3000
          isPublic: false
      paths:
        - port: 3000
          path: /
          stripPath: false
    env:
      PG_USER: app
      PG_PASSWORD: ${{ vault['kcPgPw'] }}
      PG_JDBC_STRING: jdbc:postgresql://ms-postgres-v1-${{ team.id }}-landscape-${{
        workspace.id }}-kcPg.ms-postgres:5432/app?user=app&password=${{
        vault['kcPgPw'] }}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${{ vault['kcAdminPw'] }}
      KC_BOOTSTRAP_ADMIN_USERNAME: superadmin
