name: "keycloak"
version: "v4"
author: "JD4"
displayName: "Keycloak IAM"
iconUrl: "https://raw.githubusercontent.com/codesphere-cloud/Keycloak-provider/main/assets/Keycloak.webp"
category: "security"
description: |
  Open Source Identity and Access Management.
  This provider provisions a production-ready Keycloak instance backed by PostgreSQL.

backend:
  landscape:
    gitUrl: "https://github.com/codesphere-cloud/Keycloak-provider"
    ciProfile: "keycloak"

configSchema:
  type: object
  properties:
    ADMIN_USERNAME:
      type: string
      description: "Username for the initial Keycloak administrator"
      default: "admin"
    DB_USER:
      type: string
      description: "PostgreSQL database username"
      default: "keycloak"
  required:
    - ADMIN_USERNAME
    - DB_USER
  additionalProperties: false

secretsSchema:
  type: object
  properties:
    ADMIN_PASSWORD:
      type: string
      format: password
      description: "Password for the Keycloak administrator"
    DB_PASSWORD:
      type: string
      format: password
      description: "Password for the PostgreSQL database"
  required:
    - ADMIN_PASSWORD
    - DB_PASSWORD
  additionalProperties: false

detailsSchema:
  type: object
  properties:
    hostname:
      type: string
    port:
      type: integer
  additionalProperties: false

plans:
  - id: 0
    name: "Default"
    description: "Default Plan"
    parameters: {}
