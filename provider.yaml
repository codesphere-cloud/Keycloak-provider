name: keycloak
version: v1
author: Your Team
displayName: Keycloak IAM
iconUrl: ./assets/Keycloak.webp
category: security
description: |
  Open Source Identity and Access Management.
  This provider provisions a production-ready Keycloak instance backed by PostgreSQL.

backend:
  landscape:
    gitUrl: https://github.com/codesphere-cloud/Keycloak-provider
    ciProfile: keycloak

configSchema:
  type: object
  properties:
    ADMIN_USERNAME:
      type: string
      description: Username for the initial Keycloak administrator
      default: admin
    DB_USER:
      type: string
      description: PostgreSQL database username
      default: keycloak

secretsSchema:
  type: object
  properties:
    ADMIN_PASSWORD:
      type: string
      format: password
      description: Password for the Keycloak administrator
    DB_PASSWORD:
      type: string
      format: password
      description: Password for the PostgreSQL database

detailsSchema:
  type: object
  properties:
    hostname:
      type: string
    port:
      type: integer